<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skythread — 3D Flappy Bird</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="gameShell" aria-label="Skythread 3D Flappy Bird game">
      <canvas id="scene" aria-label="3D game canvas"></canvas>

      <section class="hud" aria-live="polite">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <div>
            <p class="eyebrow">Skythread</p>
            <h1>Feather through the glass gates</h1>
          </div>
        </div>
        <div class="meters">
          <div class="meter">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="meter">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
        </div>
      </section>

      <section id="panel" class="panel">
        <p class="panel-kicker">Tap / click / space</p>
        <h2 id="panelTitle">Ride the updraft</h2>
        <p id="panelText">Guide the little prism bird through moving crystal gates. Keep a soft rhythm — every flap leaves a comet trail.</p>
        <button id="startButton" type="button">Start flight</button>
      </section>

      <div class="controls-note">Space / ↑ / click / tap to flap · P to pause</div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
