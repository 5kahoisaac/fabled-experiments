<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { display: block; }

    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    #score {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      font-size: 72px; font-weight: 900; color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4), 0 0 40px rgba(0,0,0,0.2);
      letter-spacing: 4px;
    }

    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      opacity: 1; transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay h1 {
      font-size: 64px; font-weight: 900; color: #FFD600;
      text-shadow: 0 3px 0 #E65100, 0 6px 20px rgba(0,0,0,0.5);
      margin-bottom: 10px; letter-spacing: 2px;
    }
    #overlay .subtitle {
      font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 40px;
    }
    #overlay .final-score {
      font-size: 28px; color: #fff; margin-bottom: 30px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #overlay .final-score span { font-weight: 900; color: #FFD600; font-size: 36px; }

    #startBtn, #restartBtn {
      pointer-events: auto; cursor: pointer;
      padding: 16px 48px; font-size: 22px; font-weight: 700;
      border: none; border-radius: 50px;
      background: linear-gradient(135deg, #FFD600, #FF9100);
      color: #3E2723; box-shadow: 0 4px 0 #E65100, 0 8px 30px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 1px;
    }
    #startBtn:hover, #restartBtn:hover {
      transform: translateY(-2px); box-shadow: 0 6px 0 #E65100, 0 12px 40px rgba(0,0,0,0.4);
    }
    #startBtn:active, #restartBtn:active {
      transform: translateY(2px); box-shadow: 0 2px 0 #E65100, 0 4px 20px rgba(0,0,0,0.3);
    }

    #bestScore {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 16px; color: rgba(255,255,255,0.5);
    }

    .flash {
      position: fixed; inset: 0; background: #fff; opacity: 0;
      pointer-events: none; z-index: 20; transition: opacity 0.1s;
    }
    .flash.active { opacity: 0.6; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">0</div>
    <div id="overlay">
      <h1>🐦 3D Flappy</h1>
      <p class="subtitle">Tap, Click, or Press Space to Fly</p>
      <button id="startBtn">START</button>
    </div>
    <div id="bestScore"></div>
  </div>
  <div class="flash" id="flash"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ─── CONFIG ───
    const CONFIG = {
      gravity: -22,
      flapStrength: 9,
      pipeSpeed: 5.5,
      pipeSpawnInterval: 1.6,
      pipeGap: 4.2,
      pipeSpacing: 14,
      birdY: 0,
      maxRotation: 30,
      minRotation: -25,
      groundY: -12,
      farClip: 120,
    };

    // ─── STATE ───
    let scene, camera, renderer;
    let bird, birdGroup;
    let pipes = [];
    let clouds = [];
    let particles = [];
    let ground;
    let score = 0;
    let gameState = 'idle'; // idle, playing, dead
    let velocity = 0;
    let spawnTimer = 0;
    let bestScore = parseInt(localStorage.getItem('flappy3d_best') || '0');
    let time = 0;
    let birdWingAngle = 0;
    let birdTilt = 0;

    const scoreEl = document.getElementById('score');
    const overlayEl = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const flashEl = document.getElementById('flash');
    const bestScoreEl = document.getElementById('bestScore');

    if (bestScore > 0) bestScoreEl.textContent = `Best: ${bestScore}`;

    // ─── INIT THREE.JS ───
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);
      scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, CONFIG.farClip);
      camera.position.set(0, 2, 18);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      document.body.prepend(renderer.domElement);

      // Lights
      const ambient = new THREE.AmbientLight(0x88BBFF, 0.6);
      scene.add(ambient);

      const sun = new THREE.DirectionalLight(0xFFF4E0, 1.4);
      sun.position.set(10, 20, 10);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.near = 0.5;
      sun.shadow.camera.far = 80;
      sun.shadow.camera.left = -30;
      sun.shadow.camera.right = 30;
      sun.shadow.camera.top = 30;
      sun.shadow.camera.bottom = -30;
      scene.add(sun);

      const hemi = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.5);
      scene.add(hemi);

      // Sun sphere
      const sunGeo = new THREE.SphereGeometry(3, 16, 16);
      const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFEE88 });
      const sunMesh = new THREE.Mesh(sunGeo, sunMat);
      sunMesh.position.set(25, 20, -40);
      scene.add(sunMesh);

      createBird();
      createGround();
      createClouds();

      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('mousedown', onInput);
      window.addEventListener('touchstart', onInput, { passive: true });

      startBtn.addEventListener('click', startGame);
      animate();
    }

    // ─── CREATE BIRD ───
    function createBird() {
      birdGroup = new THREE.Group();

      // Body
      const bodyGeo = new THREE.SphereGeometry(0.65, 16, 16);
      bodyGeo.scale(1, 0.9, 0.85);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xFFD600,
        roughness: 0.3,
        metalness: 0.1,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      birdGroup.add(body);

      // Belly
      const bellyGeo = new THREE.SphereGeometry(0.45, 12, 12);
      bellyGeo.scale(0.9, 0.85, 0.7);
      const bellyMat = new THREE.MeshStandardMaterial({ color: 0xFFF8DC, roughness: 0.4 });
      const belly = new THREE.Mesh(bellyGeo, bellyMat);
      belly.position.set(0, -0.15, 0.2);
      birdGroup.add(belly);

      // Head
      const headGeo = new THREE.SphereGeometry(0.45, 14, 14);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xFFD600, roughness: 0.3, metalness: 0.1 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.set(0.3, 0.25, 0);
      head.castShadow = true;
      birdGroup.add(head);

      // Eye white
      const eyeGeo = new THREE.SphereGeometry(0.16, 10, 10);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.2 });
      const eye = new THREE.Mesh(eyeGeo, eyeMat);
      eye.position.set(0.5, 0.35, 0.18);
      birdGroup.add(eye);

      // Pupil
      const pupilGeo = new THREE.SphereGeometry(0.08, 8, 8);
      const pupilMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
      const pupil = new THREE.Mesh(pupilGeo, pupilMat);
      pupil.position.set(0.58, 0.37, 0.24);
      birdGroup.add(pupil);

      // Beak
      const beakGeo = new THREE.ConeGeometry(0.12, 0.3, 6);
      const beakMat = new THREE.MeshStandardMaterial({ color: 0xFF6B2B, roughness: 0.4 });
      const beak = new THREE.Mesh(beakGeo, beakMat);
      beak.rotation.z = -Math.PI / 2;
      beak.position.set(0.6, 0.1, 0);
      birdGroup.add(beak);

      // Wing
      const wingGeo = new THREE.BoxGeometry(0.35, 0.1, 0.55);
      wingGeo.translate(0, 0, 0.25);
      const wingMat = new THREE.MeshStandardMaterial({ color: 0xFFA000, roughness: 0.4 });
      const wing = new THREE.Mesh(wingGeo, wingMat);
      wing.position.set(-0.1, 0.05, 0);
      wing.castShadow = true;
      birdGroup.add(wing);
      birdGroup.wing = wing;

      // Tail
      const tailGeo = new THREE.BoxGeometry(0.08, 0.25, 0.35);
      const tailMat = new THREE.MeshStandardMaterial({ color: 0xFF8F00, roughness: 0.4 });
      const tail = new THREE.Mesh(tailGeo, tailMat);
      tail.position.set(-0.55, 0.05, 0);
      tail.rotation.z = 0.3;
      birdGroup.add(tail);

      birdGroup.position.set(0, CONFIG.birdY, 0);
      scene.add(birdGroup);
      bird = birdGroup;
    }

    // ─── CREATE GROUND ───
    function createGround() {
      const groundGeo = new THREE.PlaneGeometry(200, 30);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x7CB343,
        roughness: 0.9,
      });
      ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = CONFIG.groundY;
      ground.receiveShadow = true;
      scene.add(ground);

      // Dirt layer
      const dirtGeo = new THREE.PlaneGeometry(200, 30);
      const dirtMat = new THREE.MeshStandardMaterial({ color: 0x8D6E63, roughness: 1 });
      const dirt = new THREE.Mesh(dirtGeo, dirtMat);
      dirt.rotation.x = -Math.PI / 2;
      dirt.position.y = CONFIG.groundY - 0.5;
      scene.add(dirt);

      // Grass stripes
      for (let i = -20; i < 20; i++) {
        const grassGeo = new THREE.BoxGeometry(1.8, 0.15, 2);
        const grassMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.28, 0.6 + Math.random() * 0.2, 0.4 + Math.random() * 0.15),
          roughness: 0.9,
        });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.position.set(i * 5 + Math.random(), CONFIG.groundY + 0.08, Math.random() * 4 - 2);
        scene.add(grass);
      }
    }

    // ─── CREATE CLOUDS ───
    function createClouds() {
      for (let i = 0; i < 15; i++) {
        const cloud = createCloud();
        cloud.position.set(
          Math.random() * 100 - 30,
          8 + Math.random() * 15,
          -20 - Math.random() * 40
        );
        cloud.userData.speed = 0.3 + Math.random() * 0.5;
        scene.add(cloud);
        clouds.push(cloud);
      }
    }

    function createCloud() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({
        color: 0xFFFFFF,
        roughness: 1,
        transparent: true,
        opacity: 0.9,
      });

      const count = 3 + Math.floor(Math.random() * 4);
      for (let i = 0; i < count; i++) {
        const r = 0.8 + Math.random() * 1.2;
        const geo = new THREE.SphereGeometry(r, 8, 8);
        const sphere = new THREE.Mesh(geo, mat);
        sphere.position.set(
          i * 1.2 - count * 0.6,
          Math.random() * 0.5,
          Math.random() * 0.6
        );
        sphere.scale.y = 0.6;
        group.add(sphere);
      }
      return group;
    }

    // ─── CREATE PIPE ───
    function createPipePair() {
      const group = new THREE.Group();
      const gapCenter = (Math.random() - 0.5) * 6;
      const gapTop = gapCenter + CONFIG.pipeGap / 2;
      const gapBottom = gapCenter - CONFIG.pipeGap / 2;
      const pipeRadius = 1.1;
      const pipeLength = 2.5;
      const topHeight = CONFIG.birdY + 14 - gapTop;
      const bottomHeight = gapBottom - CONFIG.groundY - 1;

      // Materials
      const mainMat = new THREE.MeshStandardMaterial({
        color: 0x4CAF50,
        roughness: 0.5,
        metalness: 0.1,
      });
      const darkMat = new THREE.MeshStandardMaterial({
        color: 0x388E3C,
        roughness: 0.5,
        metalness: 0.1,
      });
      const rimMat = new THREE.MeshStandardMaterial({
        color: 0x66BB6A,
        roughness: 0.4,
        metalness: 0.15,
      });

      // Top pipe
      const topGeo = new THREE.CylinderGeometry(pipeRadius, pipeRadius * 1.1, topHeight, 16);
      const topPipe = new THREE.Mesh(topGeo, mainMat);
      topPipe.position.set(0, CONFIG.birdY + topHeight / 2, 0);
      topPipe.castShadow = true;
      topPipe.receiveShadow = true;
      group.add(topPipe);

      // Top rim
      const topRimGeo = new THREE.CylinderGeometry(pipeRadius * 1.25, pipeRadius * 1.25, 0.35, 16);
      const topRim = new THREE.Mesh(topRimGeo, rimMat);
      topRim.position.set(0, CONFIG.birdY + 0.15, 0);
      topRim.castShadow = true;
      group.add(topRim);

      // Bottom pipe
      const botGeo = new THREE.CylinderGeometry(pipeRadius, pipeRadius * 1.1, bottomHeight, 16);
      const botPipe = new THREE.Mesh(botGeo, mainMat);
      botPipe.position.set(0, CONFIG.groundY + bottomHeight / 2 + 1, 0);
      botPipe.castShadow = true;
      botPipe.receiveShadow = true;
      group.add(botPipe);

      // Bottom rim
      const botRimGeo = new THREE.CylinderGeometry(pipeRadius * 1.25, pipeRadius * 1.25, 0.35, 16);
      const botRim = new THREE.Mesh(botRimGeo, rimMat);
      botRim.position.set(0, CONFIG.groundY + 1.15, 0);
      botRim.castShadow = true;
      group.add(botRim);

      // Stripes
      const stripeCount = Math.floor((topHeight + bottomHeight) / 2.5);
      for (let i = 0; i < stripeCount; i++) {
        const stripeGeo = new THREE.CylinderGeometry(pipeRadius + 0.02, pipeRadius + 0.02, 0.15, 16);
        const stripe = new THREE.Mesh(stripeGeo, darkMat);

        const yPos1 = CONFIG.birdY + 1 + (i * 2.5);
        if (yPos1 < gapTop) {
          stripe.position.set(0, yPos1, 0);
          group.add(stripe);
        }

        const yPos2 = gapBottom + 1.5 + (i * 2.5);
        if (yPos2 > CONFIG.groundY) {
          stripe.position.set(0, yPos2, 0);
          group.add(stripe);
        }
      }

      // Highlight band
      const highlightGeo = new THREE.BoxGeometry(0.08, topHeight * 0.6, pipeRadius * 1.6);
      const highlightMat = new THREE.MeshStandardMaterial({
        color: 0x81C784,
        roughness: 0.2,
        transparent: true,
        opacity: 0.3,
      });
      const highlight = new THREE.Mesh(highlightGeo, highlightMat);
      highlight.position.set(-pipeRadius * 0.5, CONFIG.birdY + topHeight / 2, 0);
      group.add(highlight);

      group.position.x = 40;
      group.userData.gapTop = gapTop;
      group.userData.gapBottom = gapBottom;
      group.userData.passed = false;

      return group;
    }

    // ─── PARTICLES ───
    function spawnParticles(pos, color, count = 8) {
      for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.08 + Math.random() * 0.08, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color });
        const p = new THREE.Mesh(geo, mat);
        p.position.copy(pos);
        p.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 4,
          (Math.random() - 0.5) * 4,
          (Math.random() - 0.5) * 4
        );
        p.userData.life = 1;
        scene.add(p);
        particles.push(p);
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.vel.clone().multiplyScalar(dt));
        p.userData.vel.y -= 8 * dt;
        p.userData.life -= dt * 2;
        p.scale.setScalar(Math.max(0, p.userData.life));
        if (p.userData.life <= 0) {
          scene.remove(p);
          particles.splice(i, 1);
        }
      }
    }

    // ─── INPUT ───
    function onInput(e) {
      if (e.type === 'touchstart') e.preventDefault();
      if (gameState === 'playing') {
        flap();
      }
    }

    function onKeyDown(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'playing') {
          flap();
        }
      }
    }

    function flap() {
      velocity = CONFIG.flapStrength;
      birdTilt = CONFIG.minRotation;
      spawnParticles(bird.position.clone(), 0xFFD600, 3);
    }

    // ─── GAME LOGIC ───
    function startGame() {
      score = 0;
      velocity = 0;
      spawnTimer = 0;
      pipes.forEach(p => scene.remove(p));
      pipes = [];
      particles.forEach(p => scene.remove(p));
      particles = [];
      bird.position.set(0, CONFIG.birdY, 0);
      bird.rotation.set(0, 0, 0);
      birdTilt = 0;
      gameState = 'playing';
      scoreEl.textContent = '0';
      overlayEl.classList.add('hidden');
    }

    function die() {
      gameState = 'dead';
      velocity = -5;
      flashEl.classList.add('active');
      setTimeout(() => flashEl.classList.remove('active'), 150);
      spawnParticles(bird.position.clone(), 0xFF5722, 20);
      spawnParticles(bird.position.clone(), 0xFFD600, 15);

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappy3d_best', bestScore.toString());
        bestScoreEl.textContent = `Best: ${bestScore}`;
      }

      setTimeout(() => {
        overlayEl.classList.remove('hidden');
        overlayEl.innerHTML = `
          <h1>Game Over</h1>
          <p class="final-score">Score: <span>${score}</span></p>
          <p class="subtitle">Best: ${bestScore}</p>
          <button id="restartBtn">PLAY AGAIN</button>
        `;
        document.getElementById('restartBtn').addEventListener('click', startGame);
      }, 800);
    }

    function checkCollision(pipe) {
      const bx = bird.position.x;
      const by = bird.position.y;
      const br = 0.5; // collision radius

      const px = pipe.position.x;
      const gTop = pipe.userData.gapTop;
      const gBot = pipe.userData.gapBottom;

      if (Math.abs(bx - px) < 1.0) {
        if (by > gTop - br || by < gBot + br) {
          return true;
        }
      }
      return false;
    }

    // ─── ANIMATE ───
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, 1 / 60);
      time += dt;

      if (gameState === 'playing') {
        // Bird physics
        velocity += CONFIG.gravity * dt;
        bird.position.y += velocity * dt;

        // Bird tilt
        const targetTilt = Math.max(CONFIG.minRotation, Math.min(CONFIG.maxRotation, velocity * 2.5));
        birdTilt += (targetTilt - birdTilt) * 5 * dt;
        bird.rotation.z = THREE.MathUtils.degToRad(birdTilt);

        // Wing flap
        birdWingAngle += 15 * dt;
        bird.wing.rotation.z = Math.sin(birdWingAngle) * 0.4;

        // Spawn pipes
        spawnTimer += dt;
        if (spawnTimer >= CONFIG.pipeSpawnInterval) {
          spawnTimer = 0;
          const pipe = createPipePair();
          scene.add(pipe);
          pipes.push(pipe);
        }

        // Move pipes
        for (let i = pipes.length - 1; i >= 0; i--) {
          const pipe = pipes[i];
          pipe.position.x -= CONFIG.pipeSpeed * dt;

          // Score
          if (!pipe.userData.passed && pipe.position.x < bird.position.x) {
            pipe.userData.passed = true;
            score++;
            scoreEl.textContent = score;
            scoreEl.style.transform = 'translateX(-50%) scale(1.3)';
            setTimeout(() => scoreEl.style.transform = 'translateX(-50%) scale(1)', 150);
            spawnParticles(bird.position.clone(), 0xFFD600, 5);
          }

          // Collision
          if (checkCollision(pipe)) {
            die();
          }

          // Remove off-screen
          if (pipe.position.x < -20) {
            scene.remove(pipe);
            pipes.splice(i, 1);
          }
        }

        // Ground / ceiling collision
        if (bird.position.y < CONFIG.groundY + 0.8 || bird.position.y > 16) {
          die();
        }
      } else if (gameState === 'dead') {
        velocity += CONFIG.gravity * dt;
        bird.position.y += velocity * dt;
        bird.rotation.z = THREE.MathUtils.degToRad(Math.min(90, bird.rotation.z + 120 * dt));
        if (bird.position.y < CONFIG.groundY + 0.5) {
          bird.position.y = CONFIG.groundY + 0.5;
          velocity = 0;
        }
      } else {
        // Idle hover
        bird.position.y = CONFIG.birdY + Math.sin(time * 2) * 0.3;
        birdWingAngle += 8 * dt;
        bird.wing.rotation.z = Math.sin(birdWingAngle) * 0.2;
        bird.rotation.z = 0;
      }

      // Move clouds
      clouds.forEach(c => {
        c.position.x -= c.userData.speed * dt;
        if (c.position.x < -50) c.position.x = 50;
      });

      // Camera follows bird vertically
      const targetCamY = bird.position.y * 0.3 + 2;
      camera.position.y += (targetCamY - camera.position.y) * 3 * dt;

      updateParticles(dt);
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ─── GO ───
    init();
  </script>
</body>
</html>
